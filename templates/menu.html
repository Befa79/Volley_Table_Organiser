<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>

    <!-- Bootstrap -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <style>
        body {
            background: #ffffff;
            color: #333;
            text-align: center;
            padding-top: 80px;
            font-family: Arial, sans-serif;
        }

        .logo {
            width: 180px;
            margin-bottom: 30px;
        }

        .menu-btn {
            width: 250px;
            margin: 10px auto;
            padding: 15px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Volley Table Organiser</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Start</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="Logo">

    <h1 class="mb-4">Welcome</h1>

    <div class="d-flex flex-column align-items-center">
        <a href="#" class="btn btn-primary menu-btn">Start</a>
        <a href="#" class="btn btn-secondary menu-btn">Settings</a>
        <a href="#" class="btn btn-danger menu-btn">Exit</a>
    </div>

    <!-- Bootstrap JS -->
    <script 
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>
