<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Tournament</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- NAVBAR (same as main page) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light shadow-sm fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">Volley Table Organiser</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/create">Create Tournament</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="container" style="padding-top: 120px; max-width: 700px;">

        <h1 class="mb-4 text-center">Create a Tournament</h1>

        <form>

            <!-- Tournament Name -->
            <div class="mb-3">
                <label class="form-label">Tournament Name</label>
                <input type="text" class="form-control" placeholder="Enter tournament name">
            </div>

            <!-- Tournament Date -->
            <div class="mb-3">
                <label class="form-label">Tournament Date</label>
                <input type="date" class="form-control">
            </div>

            <!-- Number of Teams -->
            <div class="mb-3">
                <label class="form-label">Number of Teams</label>
                <input type="number" class="form-control" min="2" max="64" placeholder="e.g. 8">
            </div>

            <!-- Number of Fields -->
            <div class="mb-3">
                <label class="form-label">Number of Fields Available</label>
                <input type="number" class="form-control" min="1" max="20" placeholder="e.g. 3">
            </div>

            <!-- Start Time -->
            <div class="mb-3">
                <label class="form-label">Start Time</label>
                <input type="time" class="form-control">
            </div>

            <!-- End Time -->
            <div class="mb-3">
                <label class="form-label">End Time</label>
                <input type="time" class="form-control">
            </div>

            <!-- Tournament Type -->
            <div class="mb-3">
                <label class="form-label">Tournament Type</label>
                <select class="form-select">
                    <option>Round Robin</option>
                    <option>Knockout</option>
                    <option>Groups + Knockout</option>
                </select>
            </div>

            <!-- Game Mode -->
            <div class="mb-3">
                <label class="form-label">Game Mode</label>
                <select class="form-select">
                    <option value="time">Based on Time</option>
                    <option value="score">Based on Score</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3">Create Tournament</button>

        </form>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script>

</body>

</html>
