{% extends "base.html" %}

{% block title %}Create Tournament{% endblock %}

{% block content %}

<div class="container" style="max-width: 700px;">

    <h1 class="mb-4 text-center">Create a Tournament</h1>

<form action="/create" method="POST">

    <!-- Row 1 -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Tournament Name</label>
            <input type="text" class="form-control" name="tournament_name">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Tournament Date</label>
            <input type="date" class="form-control" name="tournament_date">
        </div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Number of Teams</label>
            <input type="number" class="form-control" name="teams" min="2" max="64">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Number of Fields Available</label>
            <input type="number" class="form-control" name="fields" min="1" max="20">
        </div>
    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Start Time</label>
            <input type="time" class="form-control" name="start_time">
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">End Time</label>
            <input type="time" class="form-control" name="end_time">
        </div>
    </div>

    <!-- Row 4 -->
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Tournament Type</label>
            <select class="form-select" name="tournament_type">
                <option>Round Robin</option>
                <option>Knockout</option>
                <option>Groups + Knockout</option>
            </select>
        </div>

        <div class="col-md-6 mb-3">
            <label class="form-label">Game Mode</label>
            <select class="form-select" name="game_mode">
                <option value="time">Based on Time</option>
                <option value="score">Based on Score</option>
            </select>
        </div>
    </div>

    <button type="submit" class="btn btn-primary w-100 mt-3">Create Tournament</button>

</form>


</div>

{% endblock %}
